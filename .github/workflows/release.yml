name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build release binaries ─────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — native Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: cst-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            ext: ""
            cross: false

          # macOS — x86_64 (cross-compiled on M-series runner)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: cst-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
            ext: ""
            cross: false

          # Linux x86_64 — native
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cst-${{ github.ref_name }}-x86_64-linux.tar.gz
            ext: ""
            cross: false

          # Linux aarch64 — cross via cargo-cross
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cst-${{ github.ref_name }}-aarch64-linux.tar.gz
            ext: ""
            cross: true

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: cst-${{ github.ref_name }}-x86_64-windows.zip
            ext: ".exe"
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Linux native build deps
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libdbus-1-dev libsecret-1-dev

      # Windows: vcpkg openssl
      - name: Install Windows build deps
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=C:/vcpkg/installed/x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      # Install cargo-cross for aarch64 Linux
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build (native)
      - name: Build (native)
        if: "!matrix.cross"
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --package cst-cli

      # Build (cross)
      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release --target ${{ matrix.target }} \
            --package cst-cli

      - name: Package binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/cst${{ matrix.ext }}"
          ARCHIVE="${{ matrix.archive }}"
          if [[ "$ARCHIVE" == *.zip ]]; then
            7z a "$ARCHIVE" "$BIN"
          else
            tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          fi
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          # Extract the section for this version from CHANGELOG.md.
          # Falls back to a generic message if not found.
          VERSION="${{ steps.version.outputs.version }}"
          if grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            awk "/## \[$VERSION\]/,/^---$/{print}" CHANGELOG.md \
              | head -n -1 > release_notes.md
          else
            echo "Release ${{ github.ref_name }}" > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "cst ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
